  <body>
    <script>
      // PERMANENT WEBSOCKET & HMR ERROR SUPPRESSION
      // This script catches and silences WebSocket errors that occur in this environment
      (function() {
        const originalError = console.error;
        const originalWarn = console.warn;
        const originalLog = console.log;
        
        const isIgnoredMessage = (msg) => {
          if (!msg) return false;
          const s = String(msg).toLowerCase();
          return s.includes('websocket') || 
                 s.includes('hmr') || 
                 s.includes('sockjs') || 
                 s.includes('closed without opened') ||
                 s.includes('failed to connect') ||
                 s.includes('vite:hmr');
        };

        console.error = function(...args) {
          const msg = args.join(' ');
          if (isIgnoredMessage(msg)) return;
          originalError.apply(console, args);
        };
        
        console.warn = function(...args) {
          const msg = args.join(' ');
          if (isIgnoredMessage(msg)) return;
          originalWarn.apply(console, args);
        };

        console.log = function(...args) {
          const msg = args.join(' ');
          if (isIgnoredMessage(msg)) return;
          originalLog.apply(console, args);
        };

        window.addEventListener('error', function(e) {
          if (e.message && isIgnoredMessage(e.message)) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          try {
            const reason = event.reason;
            const message = (reason && typeof reason === 'object') ? (reason.message || reason.name) : String(reason);
            if (isIgnoredMessage(message) || isIgnoredMessage(String(reason))) {
              event.preventDefault();
              event.stopPropagation();
            }
          } catch (e) {}
        }, true);
      })();
    </script>
    <div id="root"></div>
